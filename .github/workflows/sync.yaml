name: Sync Docker Hub Images to GHCR

on:
  workflow_dispatch:
    inputs:
      images:
        description: "List of Docker images (with docker.io/ or registry.k8s.io/ prefix), separated by semicolon (;)"
        required: true
        default: "registry.k8s.io/agent-sandbox/agent-sandbox-controller:v0.1.1"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Images to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          INPUT_IMAGES="${{ github.event.inputs.images }}"

          IFS=';' read -ra IMAGE_LIST <<< "$INPUT_IMAGES"
          for src_image in "${IMAGE_LIST[@]}"; do
            src_image=$(echo "$src_image" | xargs)

            if [[ -z "$src_image" ]]; then
              continue
            fi

            # 支持 docker.io 和 registry.k8s.io 前缀
            if [[ "$src_image" == docker.io/* ]]; then
              target_image="ghcr.io/$OWNER/${src_image#docker.io/}"
            elif [[ "$src_image" == registry.k8s.io/* ]]; then
              target_image="ghcr.io/$OWNER/${src_image#registry.k8s.io/}"
            else
              echo "⚠️ Warning: Skipping unsupported image (must start with docker.io/ or registry.k8s.io/): $src_image"
              continue
            fi

            echo "🔁 Syncing: $src_image → $target_image"

            docker pull "$src_image"
            docker tag "$src_image" "$target_image"
            docker push "$target_image"
          done
